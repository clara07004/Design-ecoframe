<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dia 06 — Vedação perimetral</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    position: relative;
    font-family: 'Montserrat', sans-serif;
    color: #FFFFFF;
    background: #0A121E;
  }

  /* Foto full-bleed */
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 1;
  }

  /* Overlay gradiente — concentrado na base; topo respira para o detalhe construtivo aparecer */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(8, 14, 26, 0.96) 0%,
      rgba(8, 14, 26, 0.94) 32%,
      rgba(8, 14, 26, 0.62) 48%,
      rgba(8, 14, 26, 0.18) 60%,
      rgba(8, 14, 26, 0.00) 70%,
      rgba(8, 14, 26, 0.00) 88%,
      rgba(8, 14, 26, 0.45) 100%
    );
    z-index: 2;
  }

  /* Faixa de topo discreta atrás do header — só para garantir contraste do logo */
  .top-band {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 180px;
    background: linear-gradient(
      to bottom,
      rgba(8, 14, 26, 0.62) 0%,
      rgba(8, 14, 26, 0.00) 100%
    );
    z-index: 2;
  }

  /* Container principal */
  .frame {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 72px 0 72px;
  }

  /* Header — logo + tagline */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 22px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.22);
  }
  .header .logo {
    height: 64px;
    width: auto;
    display: block;
  }
  .header .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.88);
  }
  .header .tagline .dot {
    color: #4A61A0;
    margin: 0 10px;
  }

  /* Conteúdo na base */
  .content {
    padding-bottom: 72px;
  }

  .label {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #FFFFFF;
    padding: 8px 16px;
    background: #4A61A0;
    margin-bottom: 28px;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-size: 96px;
    font-weight: 700;
    line-height: 1.04;
    letter-spacing: -0.025em;
    color: #FFFFFF;
    margin-bottom: 24px;
  }

  .subhead {
    font-family: 'Montserrat', sans-serif;
    font-size: 38px;
    font-weight: 400;
    line-height: 1.35;
    color: rgba(255, 255, 255, 0.92);
    max-width: 880px;
    margin-bottom: 56px;
  }
  .subhead .highlight {
    display: inline-block;
    background: #4A61A0;
    color: #FFFFFF;
    font-weight: 600;
    padding: 2px 12px;
    margin: 0 2px;
  }

  /* Spec bar */
  .spec-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(4px);
  }
  .spec-bar .spec {
    font-family: 'Montserrat', sans-serif;
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #FFFFFF;
    text-transform: uppercase;
  }
  .spec-bar .spec .num {
    color: #FFFFFF;
    font-weight: 700;
  }
  .spec-bar .divider {
    width: 1px;
    height: 24px;
    background: rgba(255, 255, 255, 0.25);
  }
</style>
</head>
<body>

<img class="bg-photo" src="./img-post.png" alt="Macro do encontro perfil PVC com contramarco e alvenaria">

<div class="top-band"></div>
<div class="overlay"></div>

<div class="frame">

  <header class="header">
    <img class="logo" src="../../../../marca/logos/logo-branco.png" alt="Ecoframe">
    <div class="tagline">Esquadrias em PVC <span class="dot">·</span> Alto Padrão</div>
  </header>

  <div class="content">
    <span class="label">Vedação perimetral</span>

    <h1 class="headline">A janela passa no ensaio.<br>A obra não.</h1>

    <p class="subhead">
      O desempenho da esquadria termina onde começa o <span class="highlight">perímetro</span>.
    </p>

    <div class="spec-bar">
      <span class="spec"><span class="num">300 Pa</span> &nbsp;estanqueidade</span>
      <span class="divider"></span>
      <span class="spec"><span class="num">Rw 32–36 dB</span> &nbsp;isolação</span>
      <span class="divider"></span>
      <span class="spec">NBR <span class="num">10821</span> + <span class="num">15575</span></span>
    </div>
  </div>

</div>

</body>
</html>
