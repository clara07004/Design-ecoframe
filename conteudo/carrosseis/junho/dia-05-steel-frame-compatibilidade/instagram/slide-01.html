<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#06101A; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="../img-slide01.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;">

  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(6,10,24,0.97) 0%,rgba(6,10,24,0.88) 32%,rgba(6,10,24,0.52) 58%,rgba(6,10,24,0.18) 78%,rgba(6,10,24,0.05) 100%);"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,10,24,0.72) 0%,transparent 26%);"></div>

  <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:52px 72px 68px;">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:14px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;width:auto;">
      <div style="width:1.5px;height:22px;background:rgba(255,255,255,0.40);"></div>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.60);">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <!-- Bracket + headline block -->
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:22px;">
        <div style="width:30px;height:30px;border-top:2.5px solid rgba(255,255,255,0.50);border-left:2.5px solid rgba(255,255,255,0.50);"></div>
        <div style="width:30px;height:30px;border-top:2.5px solid rgba(255,255,255,0.50);border-right:2.5px solid rgba(255,255,255,0.50);"></div>
      </div>

      <h1 style="font-family:'Poppins',sans-serif;font-size:86px;font-weight:700;line-height:1.07;color:#FFFFFF;letter-spacing:-0.02em;margin-bottom:26px;">
        Esquadria de alvenaria não funciona em Steel Frame.
      </h1>

      <p style="font-family:'Montserrat',sans-serif;font-size:38px;font-weight:400;color:rgba(255,255,255,0.76);line-height:1.35;margin-bottom:44px;">
        E não é detalhe de instalação. É projeto.
      </p>

      <div style="display:inline-block;border:2px solid rgba(255,255,255,0.52);border-radius:9999px;padding:12px 38px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;color:rgba(255,255,255,0.83);letter-spacing:0.04em;">Você sabia disso?</span>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:22px;">
        <div style="width:30px;height:30px;border-bottom:2.5px solid rgba(255,255,255,0.50);border-left:2.5px solid rgba(255,255,255,0.50);"></div>
        <div style="width:30px;height:30px;border-bottom:2.5px solid rgba(255,255,255,0.50);border-right:2.5px solid rgba(255,255,255,0.50);"></div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
