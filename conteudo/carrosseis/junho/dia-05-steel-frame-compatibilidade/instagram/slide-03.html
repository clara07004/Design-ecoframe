<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#06101A; }
.hl { background:#4A61A0; color:#FFFFFF; padding:3px 12px; border-radius:3px; display:inline; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="../img-slide03.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;">

  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(6,10,24,0.97) 0%,rgba(6,10,24,0.90) 38%,rgba(6,10,24,0.55) 62%,rgba(6,10,24,0.18) 80%,rgba(6,10,24,0.04) 100%);"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,10,24,0.72) 0%,transparent 24%);"></div>

  <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:52px 72px 72px;">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:14px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;width:auto;">
      <div style="width:1.5px;height:22px;background:rgba(255,255,255,0.40);"></div>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.60);">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <!-- Content block -->
    <div>
      <h2 style="font-family:'Poppins',sans-serif;font-size:84px;font-weight:700;line-height:1.07;color:#FFFFFF;letter-spacing:-0.02em;margin-bottom:44px;">
        Steel Frame não absorve vento como alvenaria. A esquadria precisa segurar sozinha.
      </h2>

      <!-- PSQ data label -->
      <p style="font-family:'Montserrat',sans-serif;font-size:32px;font-weight:700;color:rgba(255,255,255,0.65);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:24px;">
        euroTEC FC-75 · NBR 10821
      </p>

      <!-- Data rows -->
      <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:32px;">

        <div style="display:flex;align-items:baseline;gap:20px;">
          <span class="hl" style="font-family:'Poppins',sans-serif;font-size:52px;font-weight:700;white-space:nowrap;">1.820 Pa</span>
          <span style="font-family:'Montserrat',sans-serif;font-size:36px;font-weight:400;color:rgba(255,255,255,0.80);">resistência ao vento ensaiada</span>
        </div>

        <div style="display:flex;align-items:baseline;gap:20px;">
          <span class="hl" style="font-family:'Poppins',sans-serif;font-size:52px;font-weight:700;white-space:nowrap;">2.730 Pa</span>
          <span style="font-family:'Montserrat',sans-serif;font-size:36px;font-weight:400;color:rgba(255,255,255,0.80);">segurança ao vento</span>
        </div>

        <div style="display:flex;align-items:baseline;gap:20px;">
          <span class="hl" style="font-family:'Poppins',sans-serif;font-size:52px;font-weight:700;white-space:nowrap;">300 Pa</span>
          <span style="font-family:'Montserrat',sans-serif;font-size:36px;font-weight:400;color:rgba(255,255,255,0.80);">estanqueidade à água</span>
        </div>

      </div>

      <p style="font-family:'Montserrat',sans-serif;font-size:32px;font-weight:400;color:rgba(255,255,255,0.60);line-height:1.35;">
        Regiões I a V · edifícios de até 30 pavimentos.
      </p>
    </div>

  </div>
</div>
</body>
</html>
