<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#0a0c14; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <!-- Foto full-bleed -->
  <img src="./img-slide01.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

  <!-- Gradiente: pesado na base para legibilidade do texto -->
  <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(6,10,24,0.97) 0%, rgba(6,10,24,0.78) 38%, rgba(6,10,24,0.35) 62%, rgba(0,0,0,0.06) 100%);"></div>

  <!-- Blob azul canto superior direito -->
  <div style="position:absolute;top:-100px;right:-100px;width:360px;height:360px;border-radius:50%;background:rgba(74,97,160,0.22);filter:blur(50px);"></div>

  <!-- Elemento decorativo: arco orgânico canto esquerdo superior -->
  <div style="position:absolute;top:140px;left:-80px;width:220px;height:220px;border-radius:50%;border:2px solid rgba(74,97,160,0.18);"></div>

  <!-- Camada de conteúdo -->
  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 68px;">

    <!-- Logo -->
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="../../../../marca/logos/logo-branco.png" style="height:44px;object-fit:contain;">
      <span style="width:1.5px;height:20px;background:#4A61A0;margin:0 8px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <!-- Bloco principal com bracket -->
    <div style="position:relative;padding:28px 0;">

      <!-- Cantos do bracket (topo) -->
      <div style="position:absolute;top:0;left:0;width:44px;height:2px;background:rgba(255,255,255,0.55);"></div>
      <div style="position:absolute;top:0;left:0;width:2px;height:22px;background:rgba(255,255,255,0.55);"></div>
      <div style="position:absolute;top:0;right:0;width:44px;height:2px;background:rgba(255,255,255,0.55);"></div>
      <div style="position:absolute;top:0;right:0;width:2px;height:22px;background:rgba(255,255,255,0.55);"></div>

      <!-- Headline principal -->
      <div style="font-family:'Poppins',sans-serif;font-size:74px;font-weight:700;color:#FFFFFF;line-height:1.06;letter-spacing:-0.025em;margin-bottom:18px;">
        A esquadria<br>define o conforto<br>da obra.
      </div>

      <!-- Pergunta com Ug destacado -->
      <div style="font-family:'Poppins',sans-serif;font-size:35px;font-weight:400;color:rgba(255,255,255,0.84);line-height:1.35;margin-bottom:22px;">
        Por que poucos arquitetos especificam o&nbsp;<span style="background:#4A61A0;color:#fff;padding:3px 13px;border-radius:4px;font-weight:700;font-size:33px;">Ug</span>?
      </div>

      <!-- Subtítulo -->
      <div style="font-family:'Montserrat',sans-serif;font-size:20px;font-weight:400;color:rgba(255,255,255,0.50);line-height:1.45;">
        Como a transmitância térmica impacta projetos em Steel Frame e Drywall
      </div>

      <!-- Cantos do bracket (base) -->
      <div style="position:absolute;bottom:0;left:0;width:44px;height:2px;background:rgba(255,255,255,0.55);"></div>
      <div style="position:absolute;bottom:0;left:0;width:2px;height:22px;background:rgba(255,255,255,0.55);"></div>
      <div style="position:absolute;bottom:0;right:0;width:44px;height:2px;background:rgba(255,255,255,0.55);"></div>
      <div style="position:absolute;bottom:0;right:0;width:2px;height:22px;background:rgba(255,255,255,0.55);"></div>
    </div>

    <!-- CTA pill -->
    <div style="margin-top:52px;display:flex;justify-content:flex-end;">
      <div style="border:1.5px solid rgba(255,255,255,0.38);border-radius:9999px;padding:10px 28px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.10em;text-transform:uppercase;">Arraste para ver →</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
