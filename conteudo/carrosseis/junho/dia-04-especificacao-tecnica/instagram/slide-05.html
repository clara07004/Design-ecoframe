<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide05.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

  <div style="position:absolute;inset:0;background:linear-gradient(to top,
    rgba(6,10,24,0.97) 0%,
    rgba(6,10,24,0.88) 40%,
    rgba(6,10,24,0.50) 65%,
    rgba(6,10,24,0.12) 100%);"></div>

  <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>

  <div style="position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;background:rgba(74,97,160,0.18);filter:blur(55px);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 72px;">

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <div style="width:48px;height:3px;background:#4A61A0;border-radius:2px;margin-bottom:24px;"></div>

    <div style="font-family:'Poppins',sans-serif;font-size:88px;font-weight:700;color:#FFFFFF;line-height:1.06;letter-spacing:-0.022em;margin-bottom:40px;">
      Como funciona<br>na prática.
    </div>

    <div style="display:flex;flex-direction:column;gap:28px;">

      <div style="display:flex;align-items:flex-start;gap:24px;">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(74,97,160,0.25);border:1.5px solid rgba(74,97,160,0.55);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;">
          <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;">01</span>
        </div>
        <div style="font-family:'Poppins',sans-serif;font-size:44px;font-weight:400;color:rgba(255,255,255,0.86);line-height:1.40;">Você compartilha o projeto ou descreve a necessidade.</div>
      </div>

      <div style="display:flex;align-items:flex-start;gap:24px;">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(74,97,160,0.25);border:1.5px solid rgba(74,97,160,0.55);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;">
          <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;">02</span>
        </div>
        <div style="font-family:'Poppins',sans-serif;font-size:44px;font-weight:400;color:rgba(255,255,255,0.86);line-height:1.40;">A equipe Ecoframe analisa e devolve a especificação técnica.</div>
      </div>

      <div style="display:flex;align-items:flex-start;gap:24px;">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(74,97,160,0.25);border:1.5px solid rgba(74,97,160,0.55);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;">
          <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;">03</span>
        </div>
        <div style="font-family:'Poppins',sans-serif;font-size:44px;font-weight:400;color:rgba(255,255,255,0.86);line-height:1.40;">Você decide com dados reais. Sem compromisso. Sem custo.</div>
      </div>

    </div>

  </div>
</div>
</body>
</html>
