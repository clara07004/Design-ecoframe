<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide04.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;">

  <div style="position:absolute;inset:0;background:linear-gradient(160deg,
    rgba(6,10,24,0.92) 0%,
    rgba(6,10,24,0.78) 50%,
    rgba(6,10,24,0.62) 100%);"></div>

  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 35%, rgba(6,10,24,0.50) 100%);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:64px 80px 72px;">

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div>
      <div style="width:48px;height:3px;background:#4A61A0;border-radius:2px;margin-bottom:24px;"></div>

      <div style="font-family:'Poppins',sans-serif;font-size:84px;font-weight:700;color:#FFFFFF;line-height:1.06;letter-spacing:-0.022em;margin-bottom:48px;">
        Para quem<br>essa especificação<br>foi feita.
      </div>

      <div style="display:flex;flex-direction:column;gap:32px;">

        <div style="border-left:4px solid #4A61A0;padding-left:28px;">
          <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;">Arquitetos</div>
          <div style="font-family:'Poppins',sans-serif;font-size:42px;font-weight:400;color:rgba(255,255,255,0.84);line-height:1.38;">Dados técnicos para especificar com segurança e defender o projeto.</div>
        </div>

        <div style="border-left:4px solid #4A61A0;padding-left:28px;">
          <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;">Construtores</div>
          <div style="font-family:'Poppins',sans-serif;font-size:42px;font-weight:400;color:rgba(255,255,255,0.84);line-height:1.38;">Compatibilidade garantida com Steel Frame e Drywall, sem retrabalho.</div>
        </div>

        <div style="border-left:4px solid #4A61A0;padding-left:28px;">
          <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;">Proprietários</div>
          <div style="font-family:'Poppins',sans-serif;font-size:42px;font-weight:400;color:rgba(255,255,255,0.84);line-height:1.38;">Conforto real na entrega, não promessa de catálogo.</div>
        </div>

      </div>
    </div>

    <div style="height:4px;"></div>

  </div>
</div>
</body>
</html>
