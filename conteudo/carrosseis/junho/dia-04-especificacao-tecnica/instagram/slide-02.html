<!DOCTYPE html>
<html>
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }

<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#060a18;">

  <img src="./img-slide02.jpg" style="position:absolute;top:0;left:0;width:100%;height:520px;object-fit:cover;object-position:center 30%;">

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 72px;">

      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">

    </div>

    <div style="height:360px;flex-shrink:0;"></div>

    <div style="width:48px;height:3px;background:#4A61A0;border-radius:2px;margin-bottom:28px;flex-shrink:0;"></div>

    <div style="font-family:'Poppins',sans-serif;font-size:84px;font-weight:700;color:#FFFFFF;line-height:1.06;letter-spacing:-0.022em;margin-bottom:28px;">
      O que o orçamento<br>convencional<br>não diz.
    </div>

    <div style="font-family:'Poppins',sans-serif;font-size:46px;font-weight:400;color:rgba(255,255,255,0.84);line-height:1.45;">
      Modelo, cor e prazo. Nada sobre Ug, transmitância térmica, tipo de vidro ou compatibilidade com o sistema construtivo. As reclamações chegam depois da obra entregue.

  </div>
