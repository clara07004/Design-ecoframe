<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060A18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide07.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">
  <!-- Overlay azul Ecoframe sobre a foto -->
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(74,97,160,0.88) 0%, rgba(30,45,90,0.92) 60%, rgba(6,10,24,0.96) 100%);"></div>

  <!-- Arcos decorativos -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:720px;height:720px;border-radius:50%;border:1px solid rgba(255,255,255,0.07);"></div>
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;height:520px;border-radius:50%;border:1px solid rgba(255,255,255,0.05);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;">

    <img src="../../../../../marca/logos/logo-branco.png" style="height:52px;object-fit:contain;margin-bottom:52px;">
    <div style="width:48px;height:2px;background:rgba(255,255,255,0.30);border-radius:2px;margin-bottom:48px;"></div>

    <div style="font-family:'Poppins',sans-serif;font-size:46px;font-weight:700;color:#FFFFFF;line-height:1.18;letter-spacing:-0.018em;text-align:center;margin-bottom:28px;max-width:820px;">
      euroTEC e iTEC com Ug documentado em relatório técnico.
    </div>

    <div style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:300;color:rgba(255,255,255,0.68);line-height:1.50;text-align:center;margin-bottom:60px;max-width:740px;">
      Se o seu próximo projeto exige especificação com critério, fale com nossa equipe.
    </div>

    <div style="border:2px solid rgba(255,255,255,0.50);border-radius:9999px;padding:16px 48px;">
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#FFFFFF;letter-spacing:0.10em;text-transform:uppercase;">Solicite a ficha técnica → link na bio</span>
    </div>

  </div>
</div>
</body>
</html>
