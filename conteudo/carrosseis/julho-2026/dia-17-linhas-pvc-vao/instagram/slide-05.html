<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#060a18;">

  <!-- FOTO -->
  <div style="position:absolute;top:0;left:0;width:100%;height:660px;overflow:hidden;">
    <img src="./img-slide05.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">
    <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>
    <div style="position:absolute;left:0;bottom:0;width:100%;height:240px;background:linear-gradient(to bottom, rgba(6,10,24,0) 0%, rgba(6,10,24,0.65) 55%, #060a18 100%);"></div>

    <!-- HEADER -->
    <div style="position:relative;z-index:2;padding:64px 80px 0;display:flex;align-items:center;gap:10px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>
  </div>

  <!-- PAINEL -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:690px;padding:46px 80px 58px;display:flex;flex-direction:column;">

    <!-- indicador de escala 3/4 -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:34px;">
      <div style="width:46px;height:6px;border-radius:3px;background:#4A61A0;"></div>
      <div style="width:46px;height:6px;border-radius:3px;background:#4A61A0;"></div>
      <div style="width:46px;height:6px;border-radius:3px;background:#4A61A0;"></div>
      <div style="width:46px;height:6px;border-radius:3px;background:rgba(255,255,255,0.16);"></div>
    </div>

    <!-- nome + codigo -->
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:14px;">
      <span style="font-family:'Poppins',sans-serif;font-size:46px;font-weight:700;color:#FFFFFF;letter-spacing:-0.01em;">TECplus-100</span>
      <span style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:#FFFFFF;background:#4A61A0;padding:7px 16px;border-radius:6px;letter-spacing:0.04em;">FC-100</span>
    </div>

    <!-- apelido -->
    <div style="font-family:'Poppins',sans-serif;font-size:62px;font-weight:700;color:#FFFFFF;line-height:1.04;letter-spacing:-0.02em;margin-bottom:26px;">O pesado</div>

    <!-- descricao -->
    <div style="font-family:'Montserrat',sans-serif;font-size:30px;font-weight:400;color:rgba(255,255,255,0.78);line-height:1.48;margin-bottom:auto;max-width:900px;">
      Folha de 100&nbsp;mm. Para edifícios urbanos, vãos grandes e guilhotina motorizada.
    </div>

    <!-- spec do vao -->
    <div style="border-left:3px solid #4A61A0;padding-left:26px;">
      <div style="font-family:'Montserrat',sans-serif;font-size:17px;font-weight:700;color:rgba(255,255,255,0.52);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:10px;">Correr 2 folhas até</div>
      <div style="font-family:'Poppins',sans-serif;font-size:50px;font-weight:700;color:#FFFFFF;line-height:1;">3.600 <span style="color:rgba(255,255,255,0.45);font-weight:400;">×</span> 2.600 <span style="font-size:34px;color:rgba(255,255,255,0.65);">mm</span></div>
    </div>

  </div>
</div>
</body>
</html>
