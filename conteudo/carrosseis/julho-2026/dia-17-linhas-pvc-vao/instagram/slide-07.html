<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
.step { display:flex;align-items:center;justify-content:space-between;
  background:rgba(74,97,160,0.16);border-left:4px solid #4A61A0;border-radius:0 10px 10px 0;
  padding:22px 34px; }
.mm { font-family:'Poppins',sans-serif;font-size:52px;font-weight:700;color:#FFFFFF;line-height:1;letter-spacing:-0.01em; }
.mm span { font-size:30px;color:rgba(255,255,255,0.60);font-weight:400; }
.ln { font-family:'Poppins',sans-serif;font-size:34px;font-weight:600;color:#9fb3e0;display:flex;align-items:center;gap:14px; }
.ln .arw { color:rgba(255,255,255,0.40);font-weight:300; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#060a18;">

  <img src="./img-slide07.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(6,10,24,0.86) 0%, rgba(6,10,24,0.90) 45%, rgba(6,10,24,0.96) 100%);"></div>
  <div style="position:absolute;bottom:-60px;left:-60px;width:300px;height:300px;border-radius:50%;background:rgba(74,97,160,0.20);filter:blur(60px);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 64px;">

    <!-- HEADER -->
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <div style="width:48px;height:3px;background:#4A61A0;border-radius:2px;margin-bottom:28px;"></div>
    <div style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:700;color:#FFFFFF;line-height:1.08;letter-spacing:-0.022em;margin-bottom:44px;">
      A altura do vão<br>já indica a linha
    </div>

    <!-- ESCADA -->
    <div style="display:flex;flex-direction:column;gap:18px;">
      <div class="step" style="width:60%;">
        <div class="mm">1.600 <span>mm</span></div>
        <div class="ln"><span class="arw">→</span> iTEC</div>
      </div>
      <div class="step" style="width:73%;">
        <div class="mm">2.300 <span>mm</span></div>
        <div class="ln"><span class="arw">→</span> euroTEC</div>
      </div>
      <div class="step" style="width:84%;">
        <div class="mm">2.600 <span>mm</span></div>
        <div class="ln"><span class="arw">→</span> TECplus-100</div>
      </div>
      <div class="step" style="width:100%;">
        <div class="mm">3.200 <span>mm</span></div>
        <div class="ln"><span class="arw">→</span> MAXXI</div>
      </div>
    </div>

    <div style="flex:1;"></div>

    <div style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:400;color:rgba(255,255,255,0.58);line-height:1.45;border-top:1px solid rgba(255,255,255,0.14);padding-top:24px;">
      Abrir e oscilobatente: euroTEC ou TECplus-100. MAXXI é exclusiva de correr.
    </div>

  </div>
</div>
</body>
</html>
