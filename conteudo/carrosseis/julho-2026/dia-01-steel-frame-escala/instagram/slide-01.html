<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide01.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

  <div style="position:absolute;inset:0;background:linear-gradient(to top,
    rgba(6,10,24,0.97) 0%,
    rgba(6,10,24,0.88) 35%,
    rgba(6,10,24,0.52) 60%,
    rgba(6,10,24,0.12) 100%);"></div>

  <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>

  <div style="position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:rgba(74,97,160,0.20);filter:blur(60px);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 68px;">

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <div style="position:relative;padding:32px 0 28px;">

      <div style="position:absolute;top:0;left:0;width:48px;height:2px;background:rgba(255,255,255,0.50);"></div>
      <div style="position:absolute;top:0;left:0;width:2px;height:24px;background:rgba(255,255,255,0.50);"></div>
      <div style="position:absolute;top:0;right:0;width:48px;height:2px;background:rgba(255,255,255,0.50);"></div>
      <div style="position:absolute;top:0;right:0;width:2px;height:24px;background:rgba(255,255,255,0.50);"></div>

      <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#4A61A0;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:28px;">Mercado 2026</div>

      <div style="font-family:'Poppins',sans-serif;font-size:94px;font-weight:700;color:#FFFFFF;line-height:1.02;letter-spacing:-0.028em;margin-bottom:24px;">
        Steel Frame<br>cresceu 22%<br>em 2025.
      </div>

      <div style="font-family:'Poppins',sans-serif;font-size:46px;font-weight:300;color:rgba(255,255,255,0.62);line-height:1.35;">
        Agora a pergunta mudou.
      </div>

      <div style="position:absolute;bottom:0;left:0;width:48px;height:2px;background:rgba(255,255,255,0.50);"></div>
      <div style="position:absolute;bottom:0;left:0;width:2px;height:24px;background:rgba(255,255,255,0.50);"></div>
      <div style="position:absolute;bottom:0;right:0;width:48px;height:2px;background:rgba(255,255,255,0.50);"></div>
      <div style="position:absolute;bottom:0;right:0;width:2px;height:24px;background:rgba(255,255,255,0.50);"></div>
    </div>

    <div style="margin-top:44px;display:flex;justify-content:flex-end;">
      <div style="border:1.5px solid rgba(255,255,255,0.35);border-radius:9999px;padding:12px 32px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:rgba(255,255,255,0.50);letter-spacing:0.10em;text-transform:uppercase;">Arraste para ver →</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
