<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide02.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

  <div style="position:absolute;inset:0;background:linear-gradient(to top,
    rgba(6,10,24,0.97) 0%,
    rgba(6,10,24,0.92) 42%,
    rgba(6,10,24,0.58) 68%,
    rgba(6,10,24,0.18) 100%);"></div>

  <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 72px;">

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <div style="width:48px;height:3px;background:#4A61A0;border-radius:2px;margin-bottom:28px;"></div>

    <div style="font-family:'Poppins',sans-serif;font-size:86px;font-weight:700;color:#FFFFFF;line-height:1.04;letter-spacing:-0.024em;margin-bottom:40px;">
      A pergunta não é<br>mais
      <span style="font-style:italic;font-weight:400;color:rgba(255,255,255,0.62);">funciona?</span>
    </div>

    <div style="font-family:'Poppins',sans-serif;font-size:44px;font-weight:400;color:rgba(255,255,255,0.86);line-height:1.40;margin-bottom:28px;">
      O Steel Frame saiu da fase de prova. Saiu do canteiro experimental, do projeto piloto, do construtor curioso.
    </div>

    <div style="font-family:'Poppins',sans-serif;font-size:44px;font-weight:400;color:rgba(255,255,255,0.86);line-height:1.40;margin-bottom:36px;">
      Em 2025 cresceu 22% e entrou em outro estágio.
    </div>

    <div style="display:inline-block;align-self:flex-start;">
      <span style="display:inline-block;background:#4A61A0;padding:14px 28px 16px;border-radius:6px;font-family:'Poppins',sans-serif;font-size:54px;font-weight:700;color:#FFFFFF;line-height:1;letter-spacing:-0.015em;">
        Agora é <span style="font-style:italic;">escala?</span>
      </span>
    </div>

    <div style="margin-top:38px;font-family:'Montserrat',sans-serif;font-size:22px;font-weight:400;color:rgba(255,255,255,0.42);line-height:1.45;letter-spacing:0.02em;">
      Fonte: dados de mercado 2025 — construção industrializada
    </div>

  </div>
</div>
</body>
</html>
