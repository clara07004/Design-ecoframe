<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060A18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#060A18;">

  <!-- Foto full-bleed: interior com porta de correr e sala de jantar premium -->
  <img src="./img-slide05.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;">

  <!-- Overlay escuro para o CTA — foto serve de contexto/textura -->
  <div style="position:absolute;inset:0;background:rgba(6,10,24,0.78);"></div>

  <!-- Vinheta radial reforçando o foco no centro -->
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 25%, rgba(6,10,24,0.50) 100%);"></div>

  <!-- Círculo decorativo sutil (mantém a composição circular do CTA) -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:720px;height:720px;border-radius:50%;border:1px solid rgba(74,97,160,0.14);"></div>
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;height:520px;border-radius:50%;border:1px solid rgba(74,97,160,0.08);"></div>

  <!-- Conteúdo -->
  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;">

    <!-- Logo centralizado e maior -->
    <div style="margin-bottom:48px;">
      <img src="../../../../marca/logos/logo-branco.png" style="height:64px;object-fit:contain;">
    </div>

    <!-- Linha separadora -->
    <div style="width:48px;height:2px;background:#4A61A0;border-radius:1px;margin-bottom:48px;"></div>

    <!-- Texto principal -->
    <div style="font-family:'Poppins',sans-serif;font-size:34px;font-weight:400;color:rgba(255,255,255,0.84);line-height:1.44;text-align:center;margin-bottom:44px;max-width:820px;">
      As linhas <span style="color:#fff;font-weight:600;">euroTEC</span> e <span style="color:#fff;font-weight:600;">iTEC</span> têm Ug documentado em relatório técnico.
    </div>

    <!-- Texto secundário -->
    <div style="font-family:'Poppins',sans-serif;font-size:28px;font-weight:300;color:rgba(255,255,255,0.52);line-height:1.46;text-align:center;margin-bottom:64px;max-width:740px;">
      Se o seu próximo projeto exige especificação de desempenho térmico, fale com nossa equipe.
    </div>

    <!-- Pills de produto -->
    <div style="display:flex;gap:16px;margin-bottom:72px;">
      <div style="border:1.5px solid rgba(74,97,160,0.60);border-radius:9999px;padding:12px 32px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.08em;">euroTEC</span>
      </div>
      <div style="border:1.5px solid rgba(74,97,160,0.60);border-radius:9999px;padding:12px 32px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.08em;">iTEC</span>
      </div>
    </div>

    <!-- CTA principal -->
    <div style="background:#4A61A0;border-radius:9999px;padding:22px 64px;">
      <span style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#ffffff;letter-spacing:0.10em;text-transform:uppercase;">Ficha técnica → link da bio</span>
    </div>

  </div>
</div>
</body>
</html>
