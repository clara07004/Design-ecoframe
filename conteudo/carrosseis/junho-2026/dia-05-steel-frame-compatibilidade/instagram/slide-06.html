<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#4A61A0; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <!-- Photo peeking from bottom edge (continuity) -->
  <img src="../img-slide06.jpg" style="position:absolute;bottom:0;left:0;width:100%;height:55%;object-fit:cover;object-position:center top;">

  <!-- Heavy blue overlay over photo -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:55%;background:linear-gradient(to bottom,rgba(74,97,160,1) 0%,rgba(74,97,160,0.82) 40%,rgba(74,97,160,0.60) 100%);"></div>

  <!-- Full blue background for upper portion -->
  <div style="position:absolute;top:0;left:0;width:100%;height:55%;background:#4A61A0;"></div>

  <!-- Subtle diamond texture overlay -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.06;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="diamond" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M20,0 L40,20 L20,40 L0,20 Z" fill="none" stroke="#FFFFFF" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#diamond)"/>
  </svg>

  <!-- Content: vertically centered -->
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px;z-index:10;">

    <!-- Logo large centered -->
    <img src="../../../../../marca/logos/logo-branco.png" style="height:90px;width:auto;margin-bottom:72px;">

    <!-- Headline -->
    <h2 style="font-family:'Poppins',sans-serif;font-size:84px;font-weight:700;line-height:1.07;color:#FFFFFF;letter-spacing:-0.02em;text-align:center;margin-bottom:36px;">
      Especificação é projeto. Faça antes da obra.
    </h2>

    <!-- Sub -->
    <p style="font-family:'Montserrat',sans-serif;font-size:36px;font-weight:400;color:rgba(255,255,255,0.78);line-height:1.4;text-align:center;max-width:860px;margin-bottom:56px;">
      Envie o memorial ou a planta — a equipe técnica Ecoframe devolve a especificação adequada para o seu Steel Frame.
    </p>

    <!-- Pill CTA -->
    <div style="border:2.5px solid rgba(255,255,255,0.70);border-radius:9999px;padding:18px 56px;">
      <span style="font-family:'Montserrat',sans-serif;font-size:28px;font-weight:700;color:#FFFFFF;letter-spacing:0.05em;">Falar com a equipe técnica</span>
    </div>

  </div>

</div>
</body>
</html>
