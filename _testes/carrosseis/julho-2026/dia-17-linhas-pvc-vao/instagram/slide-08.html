<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide08.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

  <div style="position:absolute;inset:0;background:linear-gradient(to top,
    rgba(6,10,24,0.97) 0%,
    rgba(6,10,24,0.90) 38%,
    rgba(6,10,24,0.56) 64%,
    rgba(6,10,24,0.16) 100%);"></div>

  <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>
  <div style="position:absolute;bottom:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(74,97,160,0.18);filter:blur(60px);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 76px;">

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <div style="width:48px;height:3px;background:#4A61A0;border-radius:2px;margin-bottom:30px;"></div>

    <div style="font-family:'Poppins',sans-serif;font-size:60px;font-weight:700;color:#FFFFFF;line-height:1.10;letter-spacing:-0.022em;margin-bottom:30px;">
      A linha certa não é<br>a mais cara. É a que<br>o projeto <span style="color:#8aa0d8;">pede.</span>
    </div>

    <div style="font-family:'Montserrat',sans-serif;font-size:29px;font-weight:400;color:rgba(255,255,255,0.78);line-height:1.50;max-width:880px;margin-bottom:40px;">
      É isso que a especificação consultiva da Ecoframe resolve antes da obra começar.
    </div>

    <div style="display:inline-flex;align-self:flex-start;border:1.5px solid rgba(74,97,160,0.75);border-radius:9999px;padding:13px 30px;">
      <span style="font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;color:#9fb3e0;letter-spacing:0.10em;text-transform:uppercase;">Especificação consultiva</span>
    </div>

  </div>
</div>
</body>
</html>
