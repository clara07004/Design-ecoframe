<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#060a18;">

  <!-- FOTO -->
  <div style="position:absolute;top:0;left:0;width:100%;height:620px;overflow:hidden;">
    <img src="./img-slide04.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">
    <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>
    <div style="position:absolute;left:0;bottom:0;width:100%;height:240px;background:linear-gradient(to bottom, rgba(6,10,24,0) 0%, rgba(6,10,24,0.65) 55%, #060a18 100%);"></div>

    <!-- HEADER -->
    <div style="position:relative;z-index:2;padding:64px 80px 0;display:flex;align-items:center;gap:10px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>
  </div>

  <!-- PAINEL -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:730px;padding:46px 80px 58px;display:flex;flex-direction:column;">

    <!-- indicador de escala 2/4 -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:32px;">
      <div style="width:46px;height:6px;border-radius:3px;background:#4A61A0;"></div>
      <div style="width:46px;height:6px;border-radius:3px;background:#4A61A0;"></div>
      <div style="width:46px;height:6px;border-radius:3px;background:rgba(255,255,255,0.16);"></div>
      <div style="width:46px;height:6px;border-radius:3px;background:rgba(255,255,255,0.16);"></div>
    </div>

    <!-- nome + codigo -->
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:14px;">
      <span style="font-family:'Poppins',sans-serif;font-size:46px;font-weight:700;color:#FFFFFF;letter-spacing:-0.01em;">euroTEC</span>
      <span style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:#FFFFFF;background:#4A61A0;padding:7px 16px;border-radius:6px;letter-spacing:0.04em;">FC-75</span>
    </div>

    <!-- apelido -->
    <div style="font-family:'Poppins',sans-serif;font-size:62px;font-weight:700;color:#FFFFFF;line-height:1.04;letter-spacing:-0.02em;margin-bottom:24px;">O versátil</div>

    <!-- descricao -->
    <div style="font-family:'Montserrat',sans-serif;font-size:29px;font-weight:400;color:rgba(255,255,255,0.78);line-height:1.46;margin-bottom:auto;max-width:920px;">
      Folha de 75&nbsp;mm. Abre quase tudo: correr, abrir, oscilobatente e guilhotina. O ponto de partida da maioria dos projetos de alto padrão.
    </div>

    <!-- spec do vao -->
    <div style="border-left:3px solid #4A61A0;padding-left:26px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;">
      <div>
        <div style="font-family:'Montserrat',sans-serif;font-size:17px;font-weight:700;color:rgba(255,255,255,0.52);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:10px;">Correr 2 folhas até</div>
        <div style="font-family:'Poppins',sans-serif;font-size:50px;font-weight:700;color:#FFFFFF;line-height:1;">2.400 <span style="color:rgba(255,255,255,0.45);font-weight:400;">×</span> 2.300 <span style="font-size:34px;color:rgba(255,255,255,0.65);">mm</span></div>
      </div>
      <div style="border:1.5px solid rgba(74,97,160,0.7);border-radius:9999px;padding:10px 22px;flex-shrink:0;">
        <span style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;color:#8aa0d8;letter-spacing:0.02em;">Rw até 36&nbsp;dB</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
