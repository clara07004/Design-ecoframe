<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#4A61A0;">

  <!-- TOPO 30% — FOTO (405px) -->
  <div style="position:absolute;top:0;left:0;width:100%;height:405px;overflow:hidden;">
    <img src="./img-slide05.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

    <!-- escurece topo p/ legibilidade do header -->
    <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>

    <!-- dissolve para o painel azul -->
    <div style="position:absolute;left:0;bottom:0;width:100%;height:180px;background:linear-gradient(to bottom, rgba(74,97,160,0) 0%, rgba(74,97,160,0.65) 60%, #4A61A0 100%);"></div>

    <!-- HEADER -->
    <div style="position:relative;z-index:2;padding:64px 80px 0;display:flex;align-items:center;gap:10px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#FFFFFF;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#FFFFFF;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>
  </div>

  <!-- PAINEL AZUL 70% (945px) -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:945px;background:#4A61A0;">

    <!-- blob suave -->
    <div style="position:absolute;top:-120px;right:-100px;width:380px;height:380px;border-radius:50%;background:rgba(255,255,255,0.07);filter:blur(60px);"></div>

    <div style="position:relative;z-index:1;padding:60px 80px 80px;height:100%;display:flex;flex-direction:column;">

      <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,0.70);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:24px;">Próximo passo</div>

      <div style="width:48px;height:3px;background:#FFFFFF;border-radius:2px;margin-bottom:28px;"></div>

      <div style="font-family:'Poppins',sans-serif;font-size:78px;font-weight:700;color:#FFFFFF;line-height:1.04;letter-spacing:-0.024em;margin-bottom:36px;">
        Especifique uma vez.<br>Repita o projeto inteiro.
      </div>

      <div style="font-family:'Poppins',sans-serif;font-size:38px;font-weight:300;color:rgba(255,255,255,0.86);line-height:1.42;margin-bottom:56px;">
        Memorial técnico para Steel Frame — euroTEC e TECplus-100 — com dimensões, ensaios PSQ e dados de norma para colar no caderno de especificações.
      </div>

      <div style="flex:1;"></div>

      <div style="display:flex;flex-direction:column;align-items:flex-start;">

        <div style="background:#FFFFFF;border-radius:9999px;padding:24px 56px;margin-bottom:28px;">
          <span style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:#4A61A0;letter-spacing:0.10em;text-transform:uppercase;">Receba o memorial →</span>
        </div>

        <div style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:400;color:rgba(255,255,255,0.72);letter-spacing:0.04em;line-height:1.40;">
          Link na bio · ecoframe.com.br/memorial-steel-frame
        </div>

      </div>

    </div>
  </div>

</div>
</body>
</html>
