<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#060a18;">

  <!-- BLOCO SUPERIOR — FOTO 60% (810px) -->
  <div style="position:absolute;top:0;left:0;width:100%;height:810px;overflow:hidden;">
    <img src="./img-slide03.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

    <!-- escurece o topo p/ destacar header -->
    <div style="position:absolute;top:0;left:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(6,10,24,0.72) 0%, transparent 100%);"></div>

    <!-- dissolve para o painel azul -->
    <div style="position:absolute;left:0;bottom:0;width:100%;height:200px;background:linear-gradient(to bottom, rgba(74,97,160,0) 0%, rgba(74,97,160,0.55) 65%, #4A61A0 100%);"></div>

    <!-- HEADER -->
    <div style="position:relative;z-index:2;padding:64px 80px 0;display:flex;align-items:center;gap:10px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>
  </div>

  <!-- BLOCO INFERIOR — PAINEL AZUL 40% (540px) -->
  <div style="position:absolute;bottom:0;left:0;width:100%;height:540px;background:#4A61A0;">

    <div style="padding:48px 80px 56px;">

      <div style="font-family:'Poppins',sans-serif;font-size:54px;font-weight:700;color:#FFFFFF;line-height:1.06;letter-spacing:-0.020em;margin-bottom:32px;">
        Escalar Steel Frame<br>é coisa de infraestrutura.
      </div>

      <div style="display:flex;flex-direction:column;gap:16px;">

        <div style="display:flex;align-items:flex-start;gap:18px;">
          <div style="width:10px;height:10px;border-radius:50%;background:#FFFFFF;flex-shrink:0;margin-top:18px;"></div>
          <span style="font-family:'Poppins',sans-serif;font-size:32px;font-weight:400;color:rgba(255,255,255,0.96);line-height:1.34;">Multifamiliar com pé-direito alto e vão único de fachada</span>
        </div>

        <div style="display:flex;align-items:flex-start;gap:18px;">
          <div style="width:10px;height:10px;border-radius:50%;background:#FFFFFF;flex-shrink:0;margin-top:18px;"></div>
          <span style="font-family:'Poppins',sans-serif;font-size:32px;font-weight:400;color:rgba(255,255,255,0.96);line-height:1.34;">Edifício urbano até 30 pavimentos, ventos regiões I a V</span>
        </div>

        <div style="display:flex;align-items:flex-start;gap:18px;">
          <div style="width:10px;height:10px;border-radius:50%;background:#FFFFFF;flex-shrink:0;margin-top:18px;"></div>
          <span style="font-family:'Poppins',sans-serif;font-size:32px;font-weight:400;color:rgba(255,255,255,0.96);line-height:1.34;">Especificação repetível: laudo, norma, previsibilidade</span>
        </div>

      </div>

      <div style="margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,0.22);font-family:'Poppins',sans-serif;font-size:30px;font-weight:600;color:#FFFFFF;line-height:1.30;">
        E a esquadria precisa acompanhar.
      </div>

    </div>
  </div>

</div>
</body>
</html>
