<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060A18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <!-- Foto full-bleed -->
  <img src="../imagens-geradas/capa-v4.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 60%;">

  <!-- Gradiente: escuro pesado na base, aberto no topo -->
  <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(6,10,24,0.97) 0%, rgba(6,10,24,0.80) 42%, rgba(6,10,24,0.32) 68%, rgba(0,0,0,0.04) 100%);"></div>

  <!-- Blob azul decorativo canto superior direito -->
  <div style="position:absolute;top:-80px;right:-80px;width:340px;height:340px;border-radius:50%;background:rgba(74,97,160,0.22);filter:blur(55px);"></div>

  <!-- Conteúdo -->
  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:64px 80px 72px;">

    <!-- Logo + tagline -->
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:44px;object-fit:contain;">
      <span style="width:1.5px;height:20px;background:#4A61A0;margin:0 8px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="flex:1;"></div>

    <!-- Bloco principal -->
    <div style="position:relative;padding:32px 0;">

      <!-- Bracket topo -->
      <div style="position:absolute;top:0;left:0;width:48px;height:2px;background:rgba(255,255,255,0.45);"></div>
      <div style="position:absolute;top:0;left:0;width:2px;height:24px;background:rgba(255,255,255,0.45);"></div>
      <div style="position:absolute;top:0;right:0;width:48px;height:2px;background:rgba(255,255,255,0.45);"></div>
      <div style="position:absolute;top:0;right:0;width:2px;height:24px;background:rgba(255,255,255,0.45);"></div>

      <!-- Série label -->
      <div style="font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#4A61A0;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:22px;">O que diferencia — Parte 1 de 4</div>

      <!-- Headline -->
      <div style="font-family:'Poppins',sans-serif;font-size:70px;font-weight:700;color:#FFFFFF;line-height:1.07;letter-spacing:-0.022em;margin-bottom:28px;">
        5 critérios que<br>separam uma<br>esquadria de<br>alto padrão.
      </div>

      <!-- Bracket base -->
      <div style="position:absolute;bottom:0;left:0;width:48px;height:2px;background:rgba(255,255,255,0.45);"></div>
      <div style="position:absolute;bottom:0;left:0;width:2px;height:24px;background:rgba(255,255,255,0.45);"></div>
      <div style="position:absolute;bottom:0;right:0;width:48px;height:2px;background:rgba(255,255,255,0.45);"></div>
      <div style="position:absolute;bottom:0;right:0;width:2px;height:24px;background:rgba(255,255,255,0.45);"></div>
    </div>

    <!-- CTA pill -->
    <div style="margin-top:52px;display:flex;justify-content:flex-end;">
      <div style="border:1.5px solid rgba(255,255,255,0.32);border-radius:9999px;padding:10px 28px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.50);letter-spacing:0.10em;text-transform:uppercase;">Arraste para ver →</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
