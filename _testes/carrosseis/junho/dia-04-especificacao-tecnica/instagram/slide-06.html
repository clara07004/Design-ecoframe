<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#060a18; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <img src="./img-slide06.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">

  <div style="position:absolute;inset:0;background:rgba(6,10,24,0.82);"></div>

  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 25%, rgba(6,10,24,0.55) 100%);"></div>

  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:rgba(74,97,160,0.12);filter:blur(80px);"></div>

  <div style="position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:64px 80px 80px;">

    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;align-self:flex-start;">
      <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;object-fit:contain;">
      <span style="width:1.5px;height:22px;background:#4A61A0;margin:0 10px;display:inline-block;"></span>
      <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:#4A61A0;letter-spacing:0.14em;text-transform:uppercase;">Esquadrias em PVC</span>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;">

      <div style="width:80px;height:80px;border-radius:50%;border:1.5px solid rgba(74,97,160,0.45);display:flex;align-items:center;justify-content:center;margin-bottom:40px;">
        <div style="width:48px;height:48px;border-radius:50%;background:#4A61A0;"></div>
      </div>

      <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#4A61A0;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:28px;">Próximo passo</div>

      <div style="font-family:'Poppins',sans-serif;font-size:88px;font-weight:700;color:#FFFFFF;line-height:1.04;letter-spacing:-0.025em;margin-bottom:24px;">
        Solicite sua<br>especificação<br>técnica.
      </div>

      <div style="font-family:'Poppins',sans-serif;font-size:44px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.45;margin-bottom:56px;">
        Sem compromisso. Sem custo.<br>Com dados reais para decidir bem.
      </div>

      <div style="background:#4A61A0;border-radius:9999px;padding:26px 80px;">
        <span style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:#ffffff;letter-spacing:0.10em;text-transform:uppercase;">Link na bio →</span>
      </div>

    </div>

    <div style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:400;color:rgba(255,255,255,0.28);letter-spacing:0.08em;text-transform:uppercase;">
      ecoframe.com.br
    </div>

  </div>
</div>
</body>
</html>
