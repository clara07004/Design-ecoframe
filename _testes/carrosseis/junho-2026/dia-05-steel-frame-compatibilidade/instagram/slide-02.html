<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; background:#06101A; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1350px;overflow:hidden;">

  <!-- Photo: product closeup (left side) -->
  <img src="../img-slide02.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:left center;">

  <!-- Dark overlay on left to darken photo -->
  <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(6,10,24,0.55) 0%,rgba(6,10,24,0.25) 50%,transparent 62%);"></div>

  <!-- Blue panel SVG (right ~44%) with curved left edge -->
  <svg style="position:absolute;top:0;left:0;width:1080px;height:1350px;" viewBox="0 0 1080 1350" preserveAspectRatio="none">
    <path d="M 600,0 Q 535,675 600,1350 L 1080,1350 L 1080,0 Z" fill="#4A61A0"/>
  </svg>

  <!-- Header: left side, over photo -->
  <div style="position:absolute;top:52px;left:72px;display:flex;align-items:center;gap:14px;z-index:10;">
    <img src="../../../../../marca/logos/logo-branco.png" style="height:48px;width:auto;">
    <div style="width:1.5px;height:22px;background:rgba(255,255,255,0.40);"></div>
    <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.60);">Esquadrias em PVC</span>
  </div>

  <!-- Text on right blue panel -->
  <div style="position:absolute;top:0;right:0;width:500px;height:100%;display:flex;flex-direction:column;justify-content:center;padding:120px 64px 80px 80px;z-index:10;">

    <h2 style="font-family:'Poppins',sans-serif;font-size:58px;font-weight:700;line-height:1.1;color:#FFFFFF;letter-spacing:-0.02em;margin-bottom:36px;">
      Parede de alvenaria tem 15 a 25 cm. Parede em Steel Frame, 9 a 14 cm.
    </h2>

    <p style="font-family:'Montserrat',sans-serif;font-size:36px;font-weight:400;color:rgba(255,255,255,0.88);line-height:1.4;">
      A esquadria precisa nascer dimensionada para a espessura real. Quando o perfil é largo demais ou o requadro é improvisado, perde-se vedação, esquadrejamento e estabilidade antes mesmo da primeira chuva.
    </p>

  </div>

</div>
</body>
</html>
